version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    target-branch: master
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 3
    target-branch: master
    commit-message:
      prefix: "ci"
