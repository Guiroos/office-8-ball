name: Deploy Production Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Executar deploy em producao no run manual"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/office_8_ball_ci
      BETTER_AUTH_SECRET: ci-test-secret
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: production
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

  deploy:
    name: Deploy Cloudflare Production Tag
    needs: verify
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy_production) }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      NEXT_PUBLIC_APP_ENV: production
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate manual deploy source
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_production }}
        run: |
          if [[ "$GITHUB_REF_TYPE" != "tag" || ! "$GITHUB_REF_NAME" =~ ^v ]]; then
            echo "::error::Manual production deploy must run from a v* tag ref."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:deploy

      - name: Build production bundle
        run: npm run build

      - name: Sync Cloudflare runtime secrets
        run: |
          printf '%s' "$DATABASE_URL" | npx wrangler secret put DATABASE_URL
          printf '%s' "$BETTER_AUTH_SECRET" | npx wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "$BETTER_AUTH_URL" | npx wrangler secret put BETTER_AUTH_URL
          printf '%s' "$NEXT_PUBLIC_APP_ENV" | npx wrangler secret put NEXT_PUBLIC_APP_ENV

      - name: Deploy to Cloudflare Workers
        run: npm run deploy:cloudflare
