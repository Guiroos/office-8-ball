name: Deploy Production Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Cloudflare Production Tag
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      NEXT_PUBLIC_APP_ENV: production
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Apply Prisma migrations
        run: npm run prisma:deploy

      - name: Build production bundle
        run: npm run build

      - name: Sync Cloudflare runtime secrets
        run: |
          printf '%s' "$DATABASE_URL" | npx wrangler secret put DATABASE_URL
          printf '%s' "$BETTER_AUTH_SECRET" | npx wrangler secret put BETTER_AUTH_SECRET
          printf '%s' "$BETTER_AUTH_URL" | npx wrangler secret put BETTER_AUTH_URL
          printf '%s' "$NEXT_PUBLIC_APP_ENV" | npx wrangler secret put NEXT_PUBLIC_APP_ENV

      - name: Deploy to Cloudflare Workers
        run: npm run deploy:cloudflare
